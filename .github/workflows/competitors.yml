name: Competitor ads.txt Monitor

on:
  schedule:
    - cron: "0 10 1 * *"   # 10 AM UTC on the 1st of every month
  workflow_dispatch:        # manual runs anytime from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  competitors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run competitor monitor
        run: python competitors.py

      - name: Commit updated files
        run: |
          git config user.name  "Competitor Monitor"
          git config user.email "monitor@github-actions"
          git add competitor_snapshots.json competitors.html competitor_*.html
          git diff --cached --quiet || git commit -m "chore: update competitor snapshots $(date -u +'%Y-%m')"
          git pull --rebase origin main
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
